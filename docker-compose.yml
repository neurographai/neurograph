# ============================================================
# NeuroGraph Full Stack - Docker Compose
#
# Usage:
#   docker compose up                      Start everything
#   docker compose up -d                   Detached mode
#   docker compose --profile neo4j up      With Neo4j
#   docker compose --profile monitoring up With Prometheus + Grafana
# ============================================================

name: neurograph

services:
  # Core: NeuroGraph Server + Dashboard
  neurograph:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ghcr.io/neurographai/neurograph:latest
    container_name: neurograph
    ports:
      - "${NEUROGRAPH_API_PORT:-8000}:8000"
      - "${NEUROGRAPH_DASHBOARD_PORT:-3000}:3000"
    environment:
      - NEUROGRAPH_STORAGE=${NEUROGRAPH_STORAGE:-embedded}
      - NEUROGRAPH_LOG_LEVEL=${NEUROGRAPH_LOG_LEVEL:-info}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NEUROGRAPH_NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEUROGRAPH_NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEUROGRAPH_NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    volumes:
      - neurograph-data:/app/data
      - neurograph-config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - neurograph-net

  # MCP Server (for Claude, Cursor, etc.)
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["mcp"]
    container_name: neurograph-mcp
    ports:
      - "${NEUROGRAPH_MCP_PORT:-8001}:8001"
    environment:
      - NEUROGRAPH_API_URL=http://neurograph:8000
    depends_on:
      neurograph:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - neurograph-net

  # Neo4j (optional, use --profile neo4j)
  neo4j:
    image: neo4j:5.26-community
    container_name: neurograph-neo4j
    profiles: ["neo4j"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - neurograph-net

  # FalkorDB (optional, use --profile falkordb)
  falkordb:
    image: falkordb/falkordb:latest
    container_name: neurograph-falkordb
    profiles: ["falkordb"]
    ports:
      - "6379:6379"
      - "3001:3000"
    volumes:
      - falkordb-data:/data
    restart: unless-stopped
    networks:
      - neurograph-net

  # Ollama (optional, use --profile local-llm)
  ollama:
    image: ollama/ollama:latest
    container_name: neurograph-ollama
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - neurograph-net

  # Prometheus (optional, use --profile monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: neurograph-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - neurograph-net

  # Grafana (optional, use --profile monitoring)
  grafana:
    image: grafana/grafana:latest
    container_name: neurograph-grafana
    profiles: ["monitoring"]
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=neurograph
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - neurograph-net

volumes:
  neurograph-data:
    driver: local
  neurograph-config:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  falkordb-data:
    driver: local
  ollama-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  neurograph-net:
    driver: bridge
