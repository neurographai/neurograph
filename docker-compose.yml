version: '3.8'

services:
  neurograph-core:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
    volumes:
      - neurograph-data:/data

  neurograph-dashboard:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      - VITE_API_BASE_URL=http://neurograph-core:8000

volumes:
  neurograph-data:
