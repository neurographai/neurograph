server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all unmatched paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to NeuroGraph core
    location /api/ {
        proxy_pass http://neurograph:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for live graph updates
    location /ws {
        proxy_pass http://neurograph:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # MCP SSE endpoint proxy
    location /mcp/ {
        proxy_pass http://neurograph-mcp:8001/;
        proxy_set_header Host $host;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/wasm
        image/svg+xml;
}
