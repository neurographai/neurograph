name: 💡 Feature Request
description: Suggest an idea for NeuroGraph
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions you've considered?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core Engine (Rust)
        - Dashboard (React/G6)
        - Python SDK
        - TypeScript SDK
        - CLI
        - MCP Server
        - Docker
        - Documentation
    validations:
      required: true
