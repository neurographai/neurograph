# ============================================================
# Publish to crates.io
# Triggered on GitHub Release, publishes all public crates
# in dependency order with index propagation waits
# ============================================================

name: Publish to crates.io
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Publish in dependency order: core → mcp → eval → embed-server → cli
      - name: Publish neurograph-core
        run: cargo publish -p neurograph-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 45

      - name: Publish neurograph-mcp
        run: cargo publish -p neurograph-mcp --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish neurograph-eval
        run: cargo publish -p neurograph-eval --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish neurograph-embed-server
        run: cargo publish -p neurograph-embed-server --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish neurograph-cli
        run: cargo publish -p neurograph-cli --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
